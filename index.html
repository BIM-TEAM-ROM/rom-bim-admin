const categoryColors = {
  "Allg. Links": "#0078d4",
  "Onboarding":  "#107c10",
  "Vorlagen":    "#8764b8",
  "Vorgaben":    "#c43e1c",
  "Benutzergruppen": "#038387",
  "Listen":      "#498205",
  "Workshops":   "#881798",
  "Loop":        "#0078d4",
  "Tipps & Tricks": "#ca5010",
  "Bilder":      "#038387",
  "Karten":      "#107c10",
  "Explorer":    "#e8a020",
};

function App() {
  const [activeCategory, setActiveCategory] = React.useState("Alle");
  const [search, setSearch] = React.useState("");
  const [copied, setCopied] = React.useState(null);

  const filtered = cards.filter(c => {
    const matchCat = activeCategory === "Alle" || c.category === activeCategory;
    const matchSearch =
      c.title.toLowerCase().includes(search.toLowerCase()) ||
      c.desc.toLowerCase().includes(search.toLowerCase()) ||
      (c.path || "").toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  });

  const handleCopy = (id, path) => {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(path);
      } else {
        // Fallback für lokale Dateien (file://)
        const ta = document.createElement("textarea");
        ta.value = path;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
    } catch (e) {
      // letzter Fallback
      const ta = document.createElement("textarea");
      ta.value = path;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    setCopied(id);
    setTimeout(() => setCopied(null), 2000);
  };

  const counts = {};
  categories.slice(1).forEach(cat => {
    counts[cat] = cards.filter(c => c.category === cat).length;
  });

  return (
    <div style={{ minHeight: "100vh", background: "#f3f2f1" }}>
      {/* Header */}
      <div style={{ background: "#fff", borderBottom: "1px solid #edebe9", padding: "16px 32px", display: "flex", alignItems: "center", gap: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
        <div style={{ width: 40, height: 40, borderRadius: 8, background: "linear-gradient(135deg, #0078d4, #005a9e)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>🏗️</div>
        <div style={{ fontSize: 22, fontWeight: 600, color: "#323130" }}>
          Zentrale Übersicht – Links, Vorlagen & Explorer-Pfade
        </div>
      </div>

      <div style={{ padding: "24px 32px" }}>
        {/* Search */}
        <div style={{ position: "relative", marginBottom: 20, maxWidth: 480 }}>
          <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: "#a19f9d", pointerEvents: "none" }}>🔍</span>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Suchen nach Titel, Beschreibung oder Pfad..."
            style={{ width: "100%", padding: "9px 12px 9px 36px", border: "1px solid #8a8886", borderRadius: 2, fontSize: 14, color: "#323130", background: "#fff", outline: "none", fontFamily: "'Segoe UI', sans-serif" }}
            onFocus={e => e.target.style.borderColor = "#0078d4"}
            onBlur={e => e.target.style.borderColor = "#8a8886"}
          />
        </div>

        {/* Filter */}
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 24 }}>
          <button onClick={() => setActiveCategory("Alle")} style={{ padding: "6px 16px", fontSize: 14, cursor: "pointer", border: activeCategory === "Alle" ? "2px solid #0078d4" : "1px solid #8a8886", borderRadius: 2, background: activeCategory === "Alle" ? "#0078d4" : "#fff", color: activeCategory === "Alle" ? "#fff" : "#323130", fontFamily: "'Segoe UI', sans-serif", fontWeight: activeCategory === "Alle" ? 600 : 400 }}>
            Alle ({cards.length})
          </button>
          {categories.slice(1).map(cat => (
            <button key={cat} onClick={() => setActiveCategory(cat)} style={{ padding: "6px 16px", fontSize: 14, cursor: "pointer", border: activeCategory === cat ? `2px solid ${categoryColors[cat]}` : "1px solid #8a8886", borderRadius: 2, background: activeCategory === cat ? categoryColors[cat] : "#fff", color: activeCategory === cat ? "#fff" : "#323130", fontFamily: "'Segoe UI', sans-serif", fontWeight: activeCategory === cat ? 600 : 400 }}>
              {cat} ({counts[cat]})
            </button>
          ))}
        </div>

        <div style={{ fontSize: 13, color: "#605e5c", marginBottom: 16 }}>{filtered.length} Einträge gefunden</div>

        {/* Cards */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(290px, 1fr))", gap: 12 }}>
          {filtered.map(card => {
            const accent = categoryColors[card.category] || "#0078d4";
            return (
              <div key={card.id}
                style={{ background: "#fff", border: "1px solid #edebe9", borderLeft: `4px solid ${accent}`, borderRadius: 2, padding: "16px 18px", boxShadow: "0 1px 3px rgba(0,0,0,0.07)", transition: "box-shadow 0.15s" }}
                onMouseEnter={e => e.currentTarget.style.boxShadow = "0 4px 14px rgba(0,0,0,0.12)"}
                onMouseLeave={e => e.currentTarget.style.boxShadow = "0 1px 3px rgba(0,0,0,0.07)"}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 20 }}>{card.icon}</span>
                    <span style={{ fontSize: 15, fontWeight: 600, color: "#323130", lineHeight: 1.3 }}>{card.title}</span>
                  </div>
                  <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 10, background: accent + "18", color: accent, fontWeight: 600, whiteSpace: "nowrap", marginLeft: 8, flexShrink: 0 }}>{card.category}</span>
                </div>
                <div style={{ fontSize: 13, color: "#605e5c", marginBottom: 12, lineHeight: 1.4 }}>{card.desc}</div>

                {card.type === "sharepoint" && (
                  <a href={card.url} target="_blank" rel="noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "7px 14px", background: accent, color: "#fff", fontSize: 13, fontWeight: 600, textDecoration: "none", borderRadius: 2, fontFamily: "'Segoe UI', sans-serif" }}>
                    🔗 Öffnen
                  </a>
                )}

                {card.type === "explorer" && (
                  <div>
                    <div style={{ background: "#f3f2f1", border: "1px solid #edebe9", borderRadius: 2, padding: "7px 10px", fontSize: 12, fontFamily: "Consolas, monospace", color: "#323130", wordBreak: "break-all", marginBottom: 8, lineHeight: 1.5 }}>
                      {card.path}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <button onClick={() => handleCopy(card.id, card.path)} style={{ padding: "7px 14px", fontSize: 13, fontWeight: 600, background: copied === card.id ? "#107c10" : accent, color: "#fff", border: "none", borderRadius: 2, cursor: "pointer", fontFamily: "'Segoe UI', sans-serif", transition: "background 0.2s" }}>
                        {copied === card.id ? "✅ Kopiert!" : "📋 Pfad kopieren"}
                      </button>
                      <span style={{ fontSize: 11, color: "#a19f9d" }}>→ im Explorer einfügen (Strg+V)</span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "60px 0", color: "#a19f9d", fontSize: 14 }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>🔍</div>
            Keine Einträge gefunden
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
